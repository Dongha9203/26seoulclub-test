<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리ON 운영 대시보드</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div id="app-shell">
  <nav id="sidebar">
    <div class="brand">동아리ON 운영</div>

    <div class="nav-group" data-group="monitoring">
      <div class="nav-group-label">모니터링</div>
      <button class="nav-item" data-route="daily-counts"><span class="nav-icon">📊</span>일별 질의/응답 건수</button>
      <button class="nav-item" data-route="qa-logs"><span class="nav-icon">💬</span>질의-답변 연계조회</button>
      <button class="nav-item" data-route="score-distribution"><span class="nav-icon">📈</span>신뢰도 분포 차트</button>
    </div>
    <hr class="nav-divider">

    <div class="nav-group" data-group="actions">
      <div class="nav-group-label">조치관리</div>
      <button class="nav-item" data-route="incomplete"><span class="nav-icon">⚠️</span>불완전 답변 조회</button>
      <button class="nav-item" data-route="unresolved"><span class="nav-icon">❗</span>미해결 답변 조회</button>
      <button class="nav-item" data-route="failure-report"><span class="nav-icon">🧾</span>원인별 집계 리포트</button>
    </div>
    <hr class="nav-divider">

    <div class="nav-group" data-group="settings">
      <div class="nav-group-label">운영설정</div>
      <button class="nav-item" data-route="operation-team"><span class="nav-icon">📞</span>담당자 연락처</button>
      <button class="nav-item" data-route="kb"><span class="nav-icon">📚</span>Knowledge Base</button>
      <button class="nav-item" data-route="threshold"><span class="nav-icon">🎯</span>신뢰도 threshold</button>
      <button class="nav-item" data-route="tone"><span class="nav-icon">🎨</span>톤 설정</button>
      <button class="nav-item" data-route="keywords"><span class="nav-icon">🚫</span>분류 키워드 관리</button>
      <button class="nav-item" data-route="api-params"><span class="nav-icon">⚙️</span>API 운영 파라미터</button>
    </div>
    <hr class="nav-divider">
    <button class="nav-item" data-route="change-password"><span class="nav-icon">🔑</span>비밀번호 변경</button>
    <button class="nav-item" id="logout-button"><span class="nav-icon">🚪</span>로그아웃</button>
  </nav>

  <main id="main"></main>
</div>
<script src="app.js"></script>
</body>
</html>
