<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리ON 챗봇</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Malgun Gothic", sans-serif;
    background: #ffffff;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header {
    padding: 14px 16px; border-bottom: 1px solid #eee;
    font-weight: 600; font-size: 15px; color: #222;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .bubble.user {
    align-self: flex-end; background: #2563eb; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start; background: #f1f3f5; color: #222;
    border-bottom-left-radius: 4px;
  }
  .bubble.error { background: #fff1f0; color: #c0392b; }
  .bubble a { color: inherit; text-decoration: underline; }
  .bubble.bot a { color: #2563eb; }
  #hint-banner {
    margin: 0 12px 10px; padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(135deg, #ffb347, #ff7a59);
    color: #fff; font-size: 13px; font-weight: 600; line-height: 1.4;
    box-shadow: 0 2px 6px rgba(255, 122, 89, 0.4);
  }
  #input-row {
    display: flex; gap: 8px; padding: 12px; border-top: 1px solid #eee;
  }
  #question-input {
    flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 14px; resize: none; font-family: inherit;
  }
  #send-button {
    padding: 0 18px; border: none; border-radius: 10px; background: #2563eb;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #send-button:disabled { background: #aac4f4; cursor: default; }
  .typing { color: #888; font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div id="header">동아리ON 챗봇</div>
  <div id="messages"></div>
  <div id="hint-banner">💡 질문을 구체적으로 적어주시면 더 정확하게 답변드릴 수 있어요 😊</div>
  <div id="input-row">
    <textarea id="question-input" rows="1" placeholder="궁금한 점을 입력해주세요"></textarea>
    <button id="send-button">전송</button>
  </div>
</div>

<script>
const STREAM_API_URL = "/api/chat/stream";
const SESSION_KEY = "donghoiOnSessionId";

function getSessionId() {
  let id = localStorage.getItem(SESSION_KEY);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
    localStorage.setItem(SESSION_KEY, id);
  }
  return id;
}

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("question-input");
const sendButton = document.getElementById("send-button");

function appendBubble(text, kind) {
  const el = document.createElement("div");
  el.className = "bubble " + kind;
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

const MARKDOWN_LINK_RE = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;

function renderBotBubble(el, text) {
  el.textContent = "";
  let lastIndex = 0;
  let match;
  while ((match = MARKDOWN_LINK_RE.exec(text)) !== null) {
    if (match.index > lastIndex) {
      el.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
    }
    const a = document.createElement("a");
    a.href = match[2];
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = match[1];
    el.appendChild(a);
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    el.appendChild(document.createTextNode(text.slice(lastIndex)));
  }
}

async function sendQuestion() {
  const question = inputEl.value.trim();
  if (!question) return;

  appendBubble(question, "user");
  inputEl.value = "";
  sendButton.disabled = true;
  let typingEl = appendBubble("답변 작성 중...", "bot");
  typingEl.classList.add("typing");

  let botEl = null;
  let buffer = "";

  function ensureBotBubble() {
    if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
    if (!botEl) {
      botEl = document.createElement("div");
      botEl.className = "bubble bot";
      messagesEl.appendChild(botEl);
    }
  }

  try {
    const res = await fetch(STREAM_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: question, session_id: getSessionId() }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      if (typingEl) { typingEl.remove(); typingEl = null; }
      const fallback = res.status === 429 ? "잠시 후 다시 시도해주세요." : "오류가 발생했습니다. 다시 시도해주세요.";
      appendBubble(data.error || fallback, "error");
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let sseBuffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, { stream: true });

      const parts = sseBuffer.split("\n\n");
      sseBuffer = parts.pop();

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith("data:")) continue;
        const event = JSON.parse(line.slice(5).trim());

        if (event.type === "delta") {
          ensureBotBubble();
          buffer += event.text;
          renderBotBubble(botEl, buffer);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (event.type === "error") {
          if (typingEl) { typingEl.remove(); typingEl = null; }
          appendBubble(event.error || "오류가 발생했습니다. 다시 시도해주세요.", "error");
        }
      }
    }
  } catch (e) {
    if (typingEl) typingEl.remove();
    appendBubble("네트워크 오류가 발생했습니다. 다시 시도해주세요.", "error");
  } finally {
    sendButton.disabled = false;
    inputEl.focus();
  }
}

sendButton.addEventListener("click", sendQuestion);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
});
</script>
</body>
</html>
